<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#080c14"/>
  <!-- outer glow ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(0,200,255,0.18)" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(0,200,255,0.1)" stroke-width="1"/>
  <!-- radar sweep arcs -->
  <path d="M256 256 L256 96" stroke="rgba(0,200,255,0.35)" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 256 L392 192" stroke="rgba(0,200,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M256 256 L416 256" stroke="rgba(0,200,255,0.12)" stroke-width="1" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="256" cy="256" r="10" fill="#00c8ff"/>
  <circle cx="256" cy="256" r="18" fill="none" stroke="rgba(0,200,255,0.5)" stroke-width="2"/>
  <!-- I.I wordmark -->
  <text x="256" y="390" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="800" letter-spacing="6" fill="url(#grad)">I.INC</text>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
